name: Cobuff Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Exact version to release, for example 1.0.677. cli/release/package.json must match.'
        required: true
        type: string
      release_repository:
        description: 'Public GitHub repository that hosts Cobuff release assets.'
        required: true
        default: 'iyang1016/cobuff-releases'
        type: string

concurrency:
  group: cobuff-release-${{ github.event_name == 'push' && github.ref_name || inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      release_repository: ${{ steps.release.outputs.release_repository }}
      checkout_ref: ${{ steps.release.outputs.checkout_ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            RELEASE_REPOSITORY="iyang1016/cobuff-releases"
          else
            VERSION="${{ inputs.version }}"
            RELEASE_REPOSITORY="${{ inputs.release_repository }}"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi

          if ! [[ "$RELEASE_REPOSITORY" =~ ^[^[:space:]/]+/[^[:space:]/]+$ ]]; then
            echo "Invalid release repository: $RELEASE_REPOSITORY" >&2
            exit 1
          fi

          PACKAGE_VERSION=$(node -p "require('./cli/release/package.json').version")
          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "cli/release/package.json version ($PACKAGE_VERSION) does not match release version ($VERSION)." >&2
            exit 1
          fi

          if npm view "cobuff@$VERSION" version >/dev/null 2>&1; then
            echo "cobuff@$VERSION is already published on npm." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_repository=$RELEASE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build-binaries:
    needs: validate-release
    uses: ./.github/workflows/cli-release-build.yml
    with:
      binary-name: cobuff
      new-version: ${{ needs.validate-release.outputs.version }}
      checkout-ref: ${{ needs.validate-release.outputs.checkout_ref }}
      env-overrides: '{"NEXT_PUBLIC_CB_ENVIRONMENT":"prod"}'
    secrets: inherit

  create-github-release:
    needs: [validate-release, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Check release token
        env:
          RELEASE_TOKEN: ${{ secrets.COBUFF_GITHUB_TOKEN || secrets.CODEBUFF_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "Set COBUFF_GITHUB_TOKEN or CODEBUFF_GITHUB_TOKEN with release permissions for the public release repository." >&2
            exit 1
          fi

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-release.outputs.version }}
          name: Cobuff v${{ needs.validate-release.outputs.version }}
          prerelease: false
          body: |
            ## Cobuff v${{ needs.validate-release.outputs.version }}

            Binary releases for all supported platforms.

            ### Install
            ```bash
            npm install -g cobuff
            ```

            ### Assets
            - `cobuff-linux-x64.tar.gz`
            - `cobuff-linux-arm64.tar.gz`
            - `cobuff-darwin-x64.tar.gz`
            - `cobuff-darwin-arm64.tar.gz`
            - `cobuff-win32-x64.tar.gz`
          files: |
            binaries/*/cobuff-*.tar.gz
          repository: ${{ needs.validate-release.outputs.release_repository }}
          token: ${{ secrets.COBUFF_GITHUB_TOKEN || secrets.CODEBUFF_GITHUB_TOKEN }}

  publish-npm:
    needs: [validate-release, create-github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-release.outputs.checkout_ref }}

      - name: Set up Node.js for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Publish npm wrapper
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd cli/release
          npm publish --access public
