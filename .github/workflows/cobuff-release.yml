name: Cobuff Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Exact version to release, for example 1.0.678. Source cli/release/package.json must match.'
        required: true
        type: string
      source_repository:
        description: 'Private Cobuff source repository.'
        required: true
        default: 'iyang1016/cobuff'
        type: string
      source_ref:
        description: 'Source branch, tag, or SHA to build from.'
        required: true
        default: 'main'
        type: string
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: cobuff-release-${{ github.event_name == 'push' && github.ref_name || inputs.version }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  validate-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      source_repository: ${{ steps.release.outputs.source_repository }}
      source_ref: ${{ steps.release.outputs.source_ref }}
    steps:
      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            SOURCE_REPOSITORY="iyang1016/cobuff"
            SOURCE_REF="main"
          else
            VERSION="${{ inputs.version }}"
            SOURCE_REPOSITORY="${{ inputs.source_repository }}"
            SOURCE_REF="${{ inputs.source_ref }}"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi

          if ! [[ "$SOURCE_REPOSITORY" =~ ^[^[:space:]/]+/[^[:space:]/]+$ ]]; then
            echo "Invalid source repository: $SOURCE_REPOSITORY" >&2
            exit 1
          fi

          if [ -z "$SOURCE_REF" ]; then
            echo "source_ref is required." >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "source_repository=$SOURCE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"

      - name: Check source token
        env:
          SOURCE_TOKEN: ${{ secrets.COBUFF_SOURCE_TOKEN || secrets.COBUFF_GITHUB_TOKEN || secrets.CODEBUFF_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$SOURCE_TOKEN" ]; then
            echo "Set COBUFF_SOURCE_TOKEN, COBUFF_GITHUB_TOKEN, or CODEBUFF_GITHUB_TOKEN with read access to the private source repo." >&2
            exit 1
          fi

      - name: Check out source repository
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.release.outputs.source_repository }}
          ref: ${{ steps.release.outputs.source_ref }}
          path: source
          token: ${{ secrets.COBUFF_SOURCE_TOKEN || secrets.COBUFF_GITHUB_TOKEN || secrets.CODEBUFF_GITHUB_TOKEN }}

      - name: Validate source release package
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./source/cli/release/package.json').version")
          if [ "$PACKAGE_VERSION" != "${{ steps.release.outputs.version }}" ]; then
            echo "source/cli/release/package.json version ($PACKAGE_VERSION) does not match release version (${{ steps.release.outputs.version }})." >&2
            exit 1
          fi

          if npm view "cobuff@${{ steps.release.outputs.version }}" version >/dev/null 2>&1; then
            echo "cobuff@${{ steps.release.outputs.version }} is already published on npm." >&2
            exit 1
          fi

  build-binaries:
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            bun_target: bun-linux-x64
            platform: linux
            arch: x64
            smoke_test: true
          - os: ubuntu-latest
            target: linux-arm64
            bun_target: bun-linux-arm64
            platform: linux
            arch: arm64
            smoke_test: false
          - os: macos-15-intel
            target: darwin-x64
            bun_target: bun-darwin-x64
            platform: darwin
            arch: x64
            smoke_test: true
          - os: macos-14
            target: darwin-arm64
            bun_target: bun-darwin-arm64
            platform: darwin
            arch: arm64
            smoke_test: true
          - os: windows-latest
            target: win32-x64
            bun_target: bun-windows-x64
            platform: win32
            arch: x64
            smoke_test: true
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.validate-release.outputs.source_repository }}
          ref: ${{ needs.validate-release.outputs.source_ref }}
          path: source
          token: ${{ secrets.COBUFF_SOURCE_TOKEN || secrets.COBUFF_GITHUB_TOKEN || secrets.CODEBUFF_GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: source/.bun-version

      - name: Install source dependencies
        working-directory: source
        run: bun install --frozen-lockfile

      - name: Ensure CLI dependencies
        working-directory: source
        run: bun install --frozen-lockfile --cwd cli

      - name: Fix OpenTUI module symlinks
        working-directory: source
        shell: bash
        run: |
          set -euo pipefail
          bun - <<'BUN'
          import fs from 'fs';
          import path from 'path';

          const rootDir = process.cwd();
          const rootOpenTui = path.join(rootDir, 'node_modules', '@opentui');
          const cliNodeModules = path.join(rootDir, 'cli', 'node_modules');
          const cliOpenTui = path.join(cliNodeModules, '@opentui');

          if (!fs.existsSync(rootOpenTui)) {
            console.log('Root @opentui packages missing; skipping fix');
            process.exit(0);
          }

          fs.mkdirSync(cliOpenTui, { recursive: true });

          const packages = ['core', 'react'];
          for (const pkg of packages) {
            const target = path.join(rootOpenTui, pkg);
            const link = path.join(cliOpenTui, pkg);

            if (!fs.existsSync(target)) {
              console.log(`Target ${target} missing; skipping ${pkg}`);
              continue;
            }

            let linkStats = null;
            try {
              linkStats = fs.lstatSync(link);
            } catch (error) {
              if (error?.code !== 'ENOENT') {
                throw error;
              }
            }

            if (linkStats) {
              let alreadyLinked = false;
              try {
                const actual = fs.realpathSync(link);
                alreadyLinked = actual === target;
              } catch {
                // Broken symlink or unreadable target; replace it.
              }

              if (alreadyLinked) {
                continue;
              }

              fs.rmSync(link, { recursive: true, force: true });
            }

            const type = process.platform === 'win32' ? 'junction' : 'dir';
            fs.symlinkSync(target, link, type);
            console.log(`Linked ${link} -> ${target}`);
          }
          BUN

      - name: Build binary
        working-directory: source/cli
        shell: bash
        env:
          VERBOSE: true
          OVERRIDE_TARGET: ${{ matrix.bun_target }}
          OVERRIDE_PLATFORM: ${{ matrix.platform }}
          OVERRIDE_ARCH: ${{ matrix.arch }}
          NEXT_PUBLIC_CB_ENVIRONMENT: prod
          NEXT_PUBLIC_CODEBUFF_APP_URL: https://codebuff.com
          NEXT_PUBLIC_SUPPORT_EMAIL: support@codebuff.com
          NEXT_PUBLIC_POSTHOG_API_KEY: test
          NEXT_PUBLIC_POSTHOG_HOST_URL: https://app.posthog.com
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test
          NEXT_PUBLIC_STRIPE_CUSTOMER_PORTAL: https://billing.stripe.com/p/login/test
          NEXT_PUBLIC_WEB_PORT: 3000
        run: bun run scripts/build-binary.ts cobuff ${{ needs.validate-release.outputs.version }}

      - name: Smoke test binary
        if: matrix.smoke_test
        working-directory: source/cli/bin
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.platform }}" = "win32" ]; then
            BIN="./cobuff.exe"
          else
            BIN="./cobuff"
          fi

          "$BIN" --version
          bun ../scripts/smoke-binary.ts "$BIN"

      - name: Create tarball
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.platform }}" = "win32" ]; then
            BINARY_FILE="cobuff.exe"
          else
            BINARY_FILE="cobuff"
          fi

          tar -czf cobuff-${{ matrix.target }}.tar.gz -C source/cli/bin "$BINARY_FILE" tree-sitter.wasm

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: cobuff-${{ matrix.target }}
          path: cobuff-${{ matrix.target }}.tar.gz

  create-github-release:
    needs: [validate-release, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: binaries/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-release.outputs.version }}
          name: Cobuff v${{ needs.validate-release.outputs.version }}
          prerelease: false
          body: |
            ## Cobuff v${{ needs.validate-release.outputs.version }}

            Binary releases for all supported platforms.

            ### Install
            ```bash
            npm install -g cobuff
            ```

            ### Assets
            - `cobuff-linux-x64.tar.gz`
            - `cobuff-linux-arm64.tar.gz`
            - `cobuff-darwin-x64.tar.gz`
            - `cobuff-darwin-arm64.tar.gz`
            - `cobuff-win32-x64.tar.gz`
          files: |
            binaries/*/cobuff-*.tar.gz

  publish-npm:
    needs: [validate-release, create-github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.validate-release.outputs.source_repository }}
          ref: ${{ needs.validate-release.outputs.source_ref }}
          path: source
          token: ${{ secrets.COBUFF_SOURCE_TOKEN || secrets.COBUFF_GITHUB_TOKEN || secrets.CODEBUFF_GITHUB_TOKEN }}

      - name: Set up Node.js for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Publish npm wrapper
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd source/cli/release
          npm publish --access public
